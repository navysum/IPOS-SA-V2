spring.application.name=ipos-sa

# ── Database ──────────────────────────────────────────────────
# !! CHANGE THE PASSWORD BELOW TO MATCH YOUR POSTGRESQL SETUP !!
# To find your password: open pgAdmin → right-click postgres user → Properties
spring.datasource.url=jdbc:postgresql://localhost:5432/iposdb
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Set dialect explicitly so Hibernate does not need a live connection to detect it
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Ensures data.sql runs AFTER Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# ── Jackson ───────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=always
spring.jackson.serialization.fail-on-empty-beans=false

# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── Mail (SMTP) ───────────────────────────────────────────────
# Configure these to match your SMTP provider (e.g. Gmail, SendGrid, or local MailHog)
# For demo: use Gmail App Password or MailHog on localhost:1025
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@infopharma.co.uk}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Set to true to disable actual sending during development (logs instead)
app.mail.disabled=${MAIL_DISABLED:false}
app.mail.from=${MAIL_USERNAME:noreply@infopharma.co.uk}

# ── Logging ───────────────────────────────────────────────────
logging.level.com.infopharma=INFO
logging.level.org.springframework.web=WARN
