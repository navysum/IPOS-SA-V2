spring.application.name=ipos-sa

# ── Database ──────────────────────────────────────────────────
# !! CHANGE THE PASSWORD BELOW TO MATCH YOUR POSTGRESQL SETUP !!
# To find your password: open pgAdmin → right-click postgres user → Properties
spring.datasource.url=jdbc:postgresql://localhost:5432/iposdb
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Set dialect explicitly so Hibernate does not need a live connection to detect it
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Ensures data.sql runs AFTER Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── Jackson ───────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=always
spring.jackson.serialization.fail-on-empty-beans=false

# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── Logging ───────────────────────────────────────────────────
logging.level.com.infopharma=INFO
logging.level.org.springframework.web=WARN
